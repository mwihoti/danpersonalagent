name: Daily Stacks Scan

on:
  schedule:
    - cron: '0 5 * * *'   # 8am Nairobi time (EAT = UTC+3)
  workflow_dispatch:        # manual "Run workflow" button in GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: danpersonaagent   # reads secrets from the danpersonaagent environment

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scan
        run: node agent.js --scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # auto-provided by Actions
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}  # free at console.groq.com — replaces local Ollama
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
          GITHUB_REPOS: ${{ secrets.STACKS_REPOS }}
